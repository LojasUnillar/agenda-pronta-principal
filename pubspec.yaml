name: agenda
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.10+10

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  get_it: ^9.2.0
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  jwt_decoder: ^2.0.1
  local_auth: ^2.1.3
  local_auth_android: ^1.0.56
  flutter_localization: ^0.3.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_svg: ^2.2.3
  crypto: ^3.0.3
  image_picker: ^1.0.7
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^18.0.1
  shimmer: ^3.0.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  permission_handler: ^11.3.1
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/env/
    - assets/icons/light/
    - assets/icons/dark/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_icon.png"
  min_sdk_android: 21
  background_color: "#ffffff"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo_icon.png"